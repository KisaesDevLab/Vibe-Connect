name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vibe
          POSTGRES_PASSWORD: vibe
          POSTGRES_DB: vibe_connect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vibe"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Format check
        run: yarn format:check

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test
        env:
          TEST_DATABASE_URL: postgres://vibe:vibe@localhost:5432/vibe_connect_test
          SESSION_SECRET: ci-session-secret-not-real
          NODE_ENV: test
