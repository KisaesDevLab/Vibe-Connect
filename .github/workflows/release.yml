name: release

# Distribution-mode release pipeline. Builds + signs + publishes both the
# vibe-connect-server and vibe-connect-client images to GHCR on every
# `vX.Y.Z` tag push. The vibe-installer / Vibe-Appliance repos pull from
# GHCR by tag; image suffixes (-server / -client) match the rest of the
# Vibe family (vibe-tb-server / vibe-tb-client). See
# vibe-distribution-plan.md for the cross-product release scheme.
on:
  push:
    tags: ['v*.*.*']

# Concurrency: serialize tag pushes so two near-simultaneous tags can't
# clobber each other's :latest. Per-tag (immutable) tags are safe in
# parallel but the rolling tags aren't.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write   # push to ghcr.io
      id-token: write   # cosign keyless via OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive `1.4.2` (X.Y.Z, immutable), `1.4` (rolling minor), and
      # `1` (rolling major) tags from the GIT_TAG (`v1.4.2`). `latest` is
      # only attached when the tag has no pre-release suffix (so a
      # `v1.5.0-rc1` tag doesn't promote rc bits to `:latest`).
      #
      # Strict validation up-front: refuse tags outside `vX.Y.Z[-prerelease]`.
      # Without this, a typo like `vv1.0.0` would push `:v1.0.0` to GHCR and
      # poison the registry; better to fail loudly at the meta step.
      - id: meta
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::tag '${GITHUB_REF_NAME}' must match vX.Y.Z or vX.Y.Z-<prerelease>"
            exit 1
          fi
          tag="${GITHUB_REF_NAME#v}"
          major="${tag%%.*}"
          minor="$(echo "$tag" | cut -d. -f1-2)"
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      # ---------- Server image (Express API) ----------
      - name: Build + push vibe-connect-server
        id: build_server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/kisaesdevlab/vibe-connect-server:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.is_release == 'true' && format('ghcr.io/kisaesdevlab/vibe-connect-server:{0}', steps.meta.outputs.minor) || '' }}
            ${{ steps.meta.outputs.is_release == 'true' && format('ghcr.io/kisaesdevlab/vibe-connect-server:{0}', steps.meta.outputs.major) || '' }}
            ${{ steps.meta.outputs.is_release == 'true' && 'ghcr.io/kisaesdevlab/vibe-connect-server:latest' || '' }}

      # ---------- Client image (nginx serving SPA) ----------
      - name: Build + push vibe-connect-client
        id: build_client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/nginx/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/kisaesdevlab/vibe-connect-client:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.is_release == 'true' && format('ghcr.io/kisaesdevlab/vibe-connect-client:{0}', steps.meta.outputs.minor) || '' }}
            ${{ steps.meta.outputs.is_release == 'true' && format('ghcr.io/kisaesdevlab/vibe-connect-client:{0}', steps.meta.outputs.major) || '' }}
            ${{ steps.meta.outputs.is_release == 'true' && 'ghcr.io/kisaesdevlab/vibe-connect-client:latest' || '' }}

      # ---------- Cosign keyless signing ----------
      # Signs the immutable digest emitted by build-push-action so a later
      # mutable tag retag (e.g. moving :latest forward) doesn't invalidate
      # the signature. Operators verify with:
      #   cosign verify ghcr.io/kisaesdevlab/vibe-connect-server:1.4.2 \
      #     --certificate-identity-regexp 'github.com/KisaesDevLab/vibe-connect' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - uses: sigstore/cosign-installer@v3
      - name: Sign vibe-connect-server
        env:
          DIGEST: ${{ steps.build_server.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/kisaesdevlab/vibe-connect-server@${DIGEST}"
      - name: Sign vibe-connect-client
        env:
          DIGEST: ${{ steps.build_client.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/kisaesdevlab/vibe-connect-client@${DIGEST}"
