<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Distribution mode: see apps/web/index.html for the rationale. -->
    <base href="__BASE_HREF__/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#1e3a8a" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- PWA manifest. nginx sub_filter swaps __BASE_HREF__ in the
         manifest JSON at request time so the start_url / scope /
         icon paths match whichever path the portal is mounted at
         (root in two-subdomain mode, /connect in path-mount mode). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- iOS-specific install hints. Safari ignores the standard
         manifest's `display: standalone` for the Add-to-Home-Screen
         pinned-app behavior — it needs apple-mobile-web-app-* tags. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Vibe" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <title>Firm Portal</title>
    <!--
      Boot script must be absolute (not relative) because the endpoint
      lives on the backend at the origin root (nginx `location /__vibe-boot.js`
      proxy_pass http://app:4000). The relative src `__vibe-boot.js`
      resolves against <base href>, which becomes `/connect/` under the
      Vibe-Appliance path-mount — sending the fetch to /connect/__vibe-boot.js
      and ultimately to the WRONG nginx listener (staff:80 instead of
      portal:8080). Using __BASE_HREF__ as an absolute prefix sidesteps
      the base href entirely.
    -->
    <script src="__BASE_HREF__/__vibe-boot.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
