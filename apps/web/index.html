<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Distribution mode: __BASE_HREF__ is replaced at request time by nginx
      (sub_filter in nginx.conf.template). Single-app mode renders '/'; multi-app
      renders '/connect/'. Every other relative URL on this page (favicon,
      manifest, the bootstrap script) resolves against this base, so the same
      built bundle works under both prefixes without rebuild. Vite is also
      configured with `base: './'` so it emits relative asset paths.
    -->
    <base href="__BASE_HREF__/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#1e3a8a" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Secure end-to-end encrypted staff messaging." />
    <title>Vibe Connect</title>
    <!--
      Bootstrap script — defines window.__VIBE_BOOT__ so the SPA knows its
      basePath, siteUrl, etc. before main.tsx imports anything that fetches.
      MUST come before the Vite-injected entry script. Served by the Express
      app under /__vibe-boot.js (cache: no-store).
    -->
    <script src="__vibe-boot.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
