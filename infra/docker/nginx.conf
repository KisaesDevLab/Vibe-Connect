user nginx;
worker_processes auto;
events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  # TLS hardening — applies to every ssl server below. Cipher allowlist drops
  # legacy block modes; prefer_server_ciphers pins order to our policy, not the
  # client's; session_cache lets resumptions skip the full handshake.
  ssl_prefer_server_ciphers on;
  ssl_ciphers             'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
  ssl_session_cache       shared:SSL:50m;
  ssl_session_timeout     1d;
  ssl_session_tickets     off;

  # Defaults for every proxied upstream. Per-location overrides (see /socket.io)
  # stay authoritative; this just caps everything else so a slow backend can't
  # hold a worker's file descriptor forever.
  proxy_connect_timeout 10s;
  proxy_send_timeout    30s;
  proxy_read_timeout    60s;

  # Docker's embedded DNS. Re-resolve `app` every 10s so we don't hold a stale IP
  # after a `docker compose up -d --force-recreate app`.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Distinguish browser navigations (Accept: text/html) from XHR / fetch (Accept:
  # application/json, */*). Several paths are simultaneously SPA client-routes AND
  # backend API routes (e.g. `/admin/audit`, `/notifications`). When the browser
  # reloads on one, we must serve the SPA shell so React Router can render it;
  # when the SPA makes an XHR to the same path, we must proxy to the backend.
  map $http_accept $vibe_wants_spa {
    default            0;
    "~*text/html"      1;
  }

  # ---- Staff site ----
  server {
    listen 443 ssl http2;
    server_name _;
    ssl_certificate     /etc/nginx/tls/connect.crt;
    ssl_certificate_key /etc/nginx/tls/connect.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP — locked down to same-origin. wasm-unsafe-eval is required so libsodium's
    # WebAssembly module can compile at runtime; all other eval/unsafe-inline forms
    # are refused. `frame-ancestors 'none'` also covers the X-Frame-Options case for
    # modern browsers. connect-src is tightened to 'self' only — pre-fix we
    # allowed bare `wss:` and `ws:` which permitted connections to any WebSocket
    # endpoint. CSP Level 3 treats same-origin wss:// as covered by 'self' when
    # served from https://, which matches how Socket.io dials back here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    location /socket.io/ {
      # NOTE: when proxy_pass contains a variable AND a URI suffix
      # (`$app_ws/socket.io/`), nginx stops auto-forwarding the request URI +
      # query string — so `?EIO=4&transport=polling` was being dropped, which
      # Engine.IO rejected as "Transport unknown" and the client reconnect-
      # looped forever. Forward the full URI explicitly instead.
      set $app_ws http://app:4000;
      proxy_pass $app_ws$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 1h;
    }

    location ~ ^/(auth|users|groups|conversations|attachments|admin|clients|firm|notifications|install|bridges|health)(/|$) {
      # Browser reload on an SPA route (e.g. /admin/groups) → serve index.html so
      # React Router renders the tab. API callers ask for JSON and go to backend.
      if ($vibe_wants_spa = 1) {
        rewrite ^ /index.html last;
      }
      set $app_backend http://app:4000;
      proxy_pass $app_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      root /usr/share/nginx/html/web;
      try_files $uri $uri/ /index.html;
    }
  }

  # ---- Client portal ----
  server {
    listen 8443 ssl http2;
    server_name _;
    ssl_certificate     /etc/nginx/tls/portal.crt;
    ssl_certificate_key /etc/nginx/tls/portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP — locked down to same-origin. wasm-unsafe-eval is required so libsodium's
    # WebAssembly module can compile at runtime; all other eval/unsafe-inline forms
    # are refused. `frame-ancestors 'none'` also covers the X-Frame-Options case for
    # modern browsers. connect-src is tightened to 'self' only — pre-fix we
    # allowed bare `wss:` and `ws:` which permitted connections to any WebSocket
    # endpoint. CSP Level 3 treats same-origin wss:// as covered by 'self' when
    # served from https://, which matches how Socket.io dials back here.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    location ~ ^/(portal|auth|attachments|notifications|health)(/|$) {
      if ($vibe_wants_spa = 1) {
        rewrite ^ /index.html last;
      }
      set $app_backend http://app:4000;
      proxy_pass $app_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      root /usr/share/nginx/html/portal;
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 80 default_server;
    # Let's Encrypt HTTP-01 challenges: forward to the app server's public
    # /.well-known/acme-challenge/:token handler. Kept unencrypted on port 80
    # because that's what the ACME spec requires. Everything else 301s to
    # HTTPS as before.
    location /.well-known/acme-challenge/ {
      set $app_backend http://app:4000;
      proxy_pass $app_backend$request_uri;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }
}
