user nginx;
worker_processes auto;
events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 100M;

  upstream app_upstream { server app:4000; }

  # ---- Staff site ----
  server {
    listen 443 ssl http2;
    server_name connect.${FIRM_DOMAIN};
    ssl_certificate     /etc/nginx/tls/connect.crt;
    ssl_certificate_key /etc/nginx/tls/connect.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location /socket.io/ {
      proxy_pass http://app_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 1h;
    }

    location ~ ^/(auth|users|groups|conversations|attachments|admin|firm|notifications|health)(/|$) {
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      root /usr/share/nginx/html/web;
      try_files $uri $uri/ /index.html;
    }
  }

  # ---- Client portal ----
  server {
    listen 443 ssl http2;
    server_name portal.${FIRM_DOMAIN};
    ssl_certificate     /etc/nginx/tls/portal.crt;
    ssl_certificate_key /etc/nginx/tls/portal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    location ~ ^/(portal|auth|attachments|notifications|health)(/|$) {
      proxy_pass http://app_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      root /usr/share/nginx/html/portal;
      try_files $uri $uri/ /index.html;
    }
  }

  server {
    listen 80 default_server;
    return 301 https://$host$request_uri;
  }
}
