# Dev / single-app appliance shape.
#
# `docker compose up` from this directory brings up the full appliance: app
# + nginx + postgres, with images built from source. This is the "smoke-
# test the production shape locally" path. Contributors running
# `yarn dev` against a live Postgres should instead use:
#   docker compose up postgres
# to bring up just the database container, then run server / web / portal
# under their normal Vite + tsx-watch workflow on the host.
#
# Mode: single-app. Cookies path '/'; SPA mounted at '/'; in-app ACME
# stays on. The grouped overlay in docker-compose.grouped.yml flips this
# to multi-app for contributors who want to test the installer's Caddy
# fronting locally.
services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe
      POSTGRES_DB: vibe_connect
    ports:
      - '${POSTGRES_PUBLISH_PORT:-5435}:5432'
    volumes:
      - vibe_pg:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibe']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: vibe-connect-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: 'postgres://vibe:vibe@postgres:5432/vibe_connect'
      SESSION_SECRET: 'dev-only-change-me-insecure-session-secret'
      SESSION_SECURE: 'false'
      # Distribution-mode knobs — single-app defaults.
      BASE_PATH: '${BASE_PATH:-/}'
      SESSION_COOKIE_PATH: '${SESSION_COOKIE_PATH:-/}'
      TLS_MODE: '${TLS_MODE:-internal}'
      SITE_URL: '${SITE_URL:-http://localhost:4000}'
      PORTAL_URL: '${PORTAL_URL:-http://localhost:4000/portal}'
      API_URL: '${API_URL:-http://localhost:4000}'
      # Phase 28: ClamAV sidecar is now part of the dev compose. The app
      # boot guard accepts CLAMD_HOST=clamav, so the previous
      # ALLOW_UNSCANNED_UPLOADS=1 escape hatch is no longer needed in this
      # compose. Devs running the server outside compose (`yarn server:dev`
      # with no sidecar) can still set ALLOW_UNSCANNED_UPLOADS=1 in their
      # local .env to bypass.
      CLAMD_HOST: 'clamav'
      CLAMD_PORT: '3310'
    expose:
      - '4000'
    ports:
      # Single-app mode publishes the app port directly so `curl
      # localhost:4000/health` works without the nginx layer in front.
      # The grouped overlay clears this with `!reset []`.
      - '${APP_PUBLISH_PORT:-4000}:4000'
    volumes:
      - app_uploads:/var/lib/vibe/connect/uploads
      # Path matches the Dockerfile's TLS_OUTPUT_DIR env so the in-app ACME
      # ticker writes into the bind-mount that nginx also mounts read-only.
      - vibe_tls:/var/lib/vibe/connect/tls
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  clamav:
    # ClamAV antivirus sidecar (Phase 28). The wire-protocol client at
    # apps/server/src/services/clamav.ts streams INSTREAM buffers here for
    # every uploaded message attachment, vault file, and intake upload.
    #
    # First boot: the entrypoint runs freshclam to download the signature
    # DB (~500MB compressed → ~1GB on disk). The start_period below covers
    # that initial download; the named volume preserves the DB across
    # restarts so subsequent boots only fetch deltas. The image's
    # entrypoint keeps freshclam running as a side process for ongoing
    # signature updates — no host-side cron needed.
    image: clamav/clamav-debian:stable
    container_name: vibe-connect-clamav
    restart: unless-stopped
    expose:
      - '3310'
    ports:
      # Published in dev so host-side integration tests (CLAMAV_E2E=1
      # vitest) can talk to the sidecar without joining the compose
      # network. The prod overlay drops this port — clamd should not be
      # reachable off the appliance host.
      - '${CLAMD_PUBLISH_PORT:-3310}:3310'
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      # clamdcheck.sh ships in the upstream image and exits 0 once clamd
      # is accepting connections AND signatures are loaded. start_period
      # = 5 minutes covers a cold-cache freshclam download on a slow link.
      test: ['CMD', 'clamdcheck.sh']
      interval: 60s
      timeout: 10s
      retries: 6
      start_period: 300s

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
    container_name: vibe-connect-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_PATH: '${BASE_PATH:-/}'
      TLS_MODE: '${TLS_MODE:-internal}'
      HTTP_PORT: '80'
      HTTPS_PORT: '443'
      PORTAL_HTTPS_PORT: '8443'
    ports:
      - '${NGINX_PUBLISH_PORT_HTTP:-80}:80'
      - '${NGINX_PUBLISH_PORT_HTTPS:-443}:443'
      - '${NGINX_PUBLISH_PORT_PORTAL:-8443}:8443'
    volumes:
      - vibe_tls:/etc/nginx/tls:ro

volumes:
  vibe_pg:
    name: vibe_connect_pg
  app_uploads:
    name: vibe_connect_uploads
  # Shared between app (writes) and nginx (reads) so the in-app ACME ticker
  # can drop fresh certs without a host bind-mount in this dev compose.
  vibe_tls:
    name: vibe_connect_tls
  # ClamAV signature DB. Survives container restarts so freshclam only
  # fetches deltas after the initial ~500MB download.
  clamav_db:
    name: vibe_connect_clamav_db
