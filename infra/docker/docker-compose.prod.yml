services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: vibe_connect
    ports:
      # Bound only to localhost so the host's test suite can reach it; never
      # expose this to the LAN in a real deployment.
      - '127.0.0.1:5435:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibe']
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 4g
    mem_reservation: 512m
    cpus: 2

  app:
    image: vibeconnect/appliance:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    # DO NOT expose the app container port to the host. Nginx reaches the
    # app on the internal docker network via `app:4000`; exposing it here
    # would bypass TLS, HSTS, CSP, and the port-8443 portal isolation, and
    # let a LAN client hit the raw Express server. If you need local admin
    # access during debugging, use `docker compose exec app wget ...`.
    expose:
      - '4000'
    volumes:
      - app_uploads:/app/uploads
      # TLS certs written by the tlsAcme service live here. Nginx
      # bind-mounts the same host directory read-only below and reloads
      # when files change.
      - ./tls:/app/tls
    # Appliance host may be a single-tenant VPS; cap so a runaway request
    # surge can't OOM the host and take postgres with it. Tune in ops as
    # load patterns become clearer. mem_limit/cpus work on both swarm and
    # compose v2 without requiring a `deploy:` block under `docker compose`.
    mem_limit: 2g
    mem_reservation: 512m
    cpus: 2
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    build:
      # Repo root so the Dockerfile can reach apps/{web,portal} + packages/*
      # to build fresh frontend bundles instead of relying on a pre-populated
      # ./static directory on the host.
      context: ../..
      dockerfile: infra/docker/nginx/Dockerfile
    image: vibeconnect/appliance-nginx:${VERSION:-latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
      - '8443:8443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls:/etc/nginx/tls:ro
      # Frontend assets are now baked into the image by the multi-stage
      # build above — no host bind-mount needed, and no risk of nginx
      # serving a stale committed bundle that drifts from apps/* source.

volumes:
  pg_data:
    name: vibe_connect_pg
  app_uploads:
    name: vibe_connect_uploads
