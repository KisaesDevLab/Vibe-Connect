services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: vibe_connect
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vibe']
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: vibeconnect/appliance:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '4000:4000'
    volumes:
      - app_uploads:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls:/etc/nginx/tls:ro

volumes:
  pg_data:
    name: vibe_connect_pg
  app_uploads:
    name: vibe_connect_uploads
